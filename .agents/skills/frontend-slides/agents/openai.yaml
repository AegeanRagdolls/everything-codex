interface:
  display_name: "Frontend Slides"
  short_description: "Create stunning, animation-rich HTML presentations from scratch or by converting PowerPoint files. Use when the user wants to build a..."
  default_prompt: "Use the frontend-slides skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "node"
      description: "Required only for workflows that invoke local node tooling."
    - type: "runtime"
      value: "python"
      description: "Required only for workflows that invoke local python tooling."
    - type: "runtime"
      value: "browser"
      description: "Required only for workflows that invoke local browser tooling."
    - type: "env"
      value: "GITHUB_TOKEN"
      description: "Required only for real GITHUB_TOKEN integration tests; not used by mock smoke tests."
