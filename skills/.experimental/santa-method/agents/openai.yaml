interface:
  display_name: "Santa Method"
  short_description: "Multi-agent adversarial verification with convergence loop. Two independent review agents must both pass before output ships. Use when Codex needs..."
  default_prompt: "Use the santa-method skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "python"
      description: "Required only for workflows that invoke local python tooling."
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
