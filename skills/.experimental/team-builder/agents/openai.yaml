interface:
  display_name: "Team Builder"
  short_description: "Interactive agent picker for composing and dispatching parallel teams. Use when Codex needs support for: Interactive agent picker for composing..."
  default_prompt: "Use the team-builder skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
