interface:
  display_name: "Security Bounty Hunter"
  short_description: "Hunt for exploitable, bounty-worthy security issues in repositories. Focuses on remotely reachable vulnerabilities that qualify for real reports..."
  default_prompt: "Use the security-bounty-hunter skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
