interface:
  display_name: "API Connector Builder"
  short_description: "Build a new API connector or provider by matching the target repo's existing integration pattern exactly. Use when adding one more integration..."
  default_prompt: "Use the api-connector-builder skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "node"
      description: "Required only for workflows that invoke local node tooling."
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "GITHUB_TOKEN"
      description: "Required only for real GITHUB_TOKEN integration tests; not used by mock smoke tests."
