interface:
  display_name: "Email Ops"
  short_description: "Evidence-first mailbox triage, drafting, send verification, and sent-mail-safe follow- up workflow for ECC. Use when the user wants to organize..."
  default_prompt: "Use the email-ops skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
