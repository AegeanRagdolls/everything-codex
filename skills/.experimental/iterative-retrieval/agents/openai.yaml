interface:
  display_name: "Iterative Retrieval"
  short_description: "Pattern for progressively refining context retrieval to solve the subagent context problem. Use when Codex needs support for: Pattern for..."
  default_prompt: "Use the iterative-retrieval skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "node"
      description: "Required only for workflows that invoke local node tooling."
    - type: "runtime"
      value: "bun"
      description: "Required only for workflows that invoke local bun tooling."
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
