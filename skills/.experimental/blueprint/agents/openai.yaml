interface:
  display_name: "Blueprint"
  short_description: ">- Turn a one-line objective into a step-by-step construction plan for multi-session, multi-agent engineering projects. Each step has a..."
  default_prompt: "Use the blueprint skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "ANTHROPIC_API_KEY"
      description: "Required only for real ANTHROPIC_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "OPENAI_API_KEY"
      description: "Required only for real OPENAI_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "GITHUB_TOKEN"
      description: "Required only for real GITHUB_TOKEN integration tests; not used by mock smoke tests."
