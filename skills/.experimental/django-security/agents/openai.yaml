interface:
  display_name: "Django Security"
  short_description: "Django security best practices, authentication, authorization, CSRF protection, SQL injection prevention, XSS prevention, and secure deployment..."
  default_prompt: "Use the django-security skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "node"
      description: "Required only for workflows that invoke local node tooling."
    - type: "runtime"
      value: "python"
      description: "Required only for workflows that invoke local python tooling."
    - type: "runtime"
      value: "browser"
      description: "Required only for workflows that invoke local browser tooling."
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
