interface:
  display_name: "Postgres Patterns"
  short_description: "PostgreSQL database patterns for query optimization, schema design, indexing, and security. Based on Supabase best practices. Use when Codex needs..."
  default_prompt: "Use the postgres-patterns skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
