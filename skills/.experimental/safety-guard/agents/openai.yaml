interface:
  display_name: "Safety Guard"
  short_description: "Use when preventing destructive operations during production, deployment, migration, autonomous-agent, or broad filesystem work. Do not use for..."
  default_prompt: "Use the safety-guard skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "node"
      description: "Required only for workflows that invoke local node tooling."
