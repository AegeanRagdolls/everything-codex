interface:
  display_name: "Skill Comply"
  short_description: "Visualize whether skills, rules, and agent definitions are actually followed — auto- generates scenarios at 3 prompt strictness levels, runs..."
  default_prompt: "Use the skill-comply skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "python"
      description: "Required only for workflows that invoke local python tooling."
