interface:
  display_name: "Click Path Audit"
  short_description: "Trace every user-facing button/touchpoint through its full state change sequence to find bugs where functions individually work but cancel each..."
  default_prompt: "Use the click-path-audit skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
