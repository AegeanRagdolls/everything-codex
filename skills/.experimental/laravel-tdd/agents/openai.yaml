interface:
  display_name: "Laravel TDD"
  short_description: "Test-driven development for Laravel with PHPUnit and Pest, factories, database testing, fakes, and coverage targets. Use when Codex needs support..."
  default_prompt: "Use the laravel-tdd skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
