interface:
  display_name: "Dart Flutter Patterns"
  short_description: "Production-ready Dart and Flutter patterns covering null safety, immutable state, async composition, widget architecture, popular state management..."
  default_prompt: "Use the dart-flutter-patterns skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
