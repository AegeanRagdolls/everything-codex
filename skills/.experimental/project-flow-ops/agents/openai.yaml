interface:
  display_name: "Project Flow Ops"
  short_description: "Operate execution flow across GitHub and Linear by triaging issues and pull requests, linking active work, and keeping GitHub public-facing while..."
  default_prompt: "Use the project-flow-ops skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "GITHUB_TOKEN"
      description: "Required only for real GITHUB_TOKEN integration tests; not used by mock smoke tests."
