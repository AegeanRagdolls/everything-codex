interface:
  display_name: "Benchmark"
  short_description: "Use this skill to measure performance baselines, detect regressions before/after PRs, and compare stack alternatives. Use when Codex needs support..."
  default_prompt: "Use the benchmark skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "node"
      description: "Required only for workflows that invoke local node tooling."
    - type: "runtime"
      value: "bun"
      description: "Required only for workflows that invoke local bun tooling."
    - type: "runtime"
      value: "browser"
      description: "Required only for workflows that invoke local browser tooling."
