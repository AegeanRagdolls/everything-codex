interface:
  display_name: "Ck"
  short_description: "Persistent per-project memory for Claude Code. Auto-loads project context on session start, tracks sessions with git activity, and writes to..."
  default_prompt: "Use the ck skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "node"
      description: "Required only for workflows that invoke local node tooling."
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
