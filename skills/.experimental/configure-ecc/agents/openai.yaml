interface:
  display_name: "Configure Ecc"
  short_description: "Interactive installer for Everything Claude Code — guides users through selecting and installing skills and rules to user-level or project-level..."
  default_prompt: "Use the configure-ecc skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "node"
      description: "Required only for workflows that invoke local node tooling."
    - type: "runtime"
      value: "bun"
      description: "Required only for workflows that invoke local bun tooling."
    - type: "runtime"
      value: "python"
      description: "Required only for workflows that invoke local python tooling."
    - type: "runtime"
      value: "ffmpeg"
      description: "Required only for workflows that invoke local ffmpeg tooling."
    - type: "runtime"
      value: "tmux"
      description: "Required only for workflows that invoke local tmux tooling."
    - type: "runtime"
      value: "browser"
      description: "Required only for workflows that invoke local browser tooling."
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "mcp"
      value: "firecrawl"
      description: "Required only when running real firecrawl MCP-backed workflows."
    - type: "api"
      value: "fal.ai"
      description: "Required only for real fal.ai API-backed workflows."
    - type: "env"
      value: "ANTHROPIC_API_KEY"
      description: "Required only for real ANTHROPIC_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "FIRECRAWL_API_KEY"
      description: "Required only for real FIRECRAWL_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "FAL_KEY"
      description: "Required only for real FAL_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "X_API_KEY"
      description: "Required only for real X_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "GITHUB_TOKEN"
      description: "Required only for real GITHUB_TOKEN integration tests; not used by mock smoke tests."
