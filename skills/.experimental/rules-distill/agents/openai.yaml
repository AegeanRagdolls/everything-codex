interface:
  display_name: "Rules Distill"
  short_description: "Scan skills to extract cross-cutting principles and distill them into rules — append, revise, or create new rule files. Use when Codex needs..."
  default_prompt: "Use the rules-distill skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
