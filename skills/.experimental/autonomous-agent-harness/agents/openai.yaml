interface:
  display_name: "Autonomous Agent Harness"
  short_description: "Transform Claude Code into a fully autonomous agent system with persistent memory, scheduled operations, computer use, and task queuing. Replaces..."
  default_prompt: "Use the autonomous-agent-harness skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "node"
      description: "Required only for workflows that invoke local node tooling."
    - type: "runtime"
      value: "browser"
      description: "Required only for workflows that invoke local browser tooling."
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "ANTHROPIC_API_KEY"
      description: "Required only for real ANTHROPIC_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
    - type: "env"
      value: "GITHUB_TOKEN"
      description: "Required only for real GITHUB_TOKEN integration tests; not used by mock smoke tests."
