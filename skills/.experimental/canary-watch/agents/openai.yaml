interface:
  display_name: "Canary Watch"
  short_description: "Use this skill to monitor a deployed URL for regressions after deploys, merges, or dependency upgrades. Use when Codex needs support for: Use this..."
  default_prompt: "Use the canary-watch skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "runtime"
      value: "browser"
      description: "Required only for workflows that invoke local browser tooling."
    - type: "env"
      value: "GITHUB_TOKEN"
      description: "Required only for real GITHUB_TOKEN integration tests; not used by mock smoke tests."
