interface:
  display_name: "Swift Protocol Di Testing"
  short_description: "Protocol-based dependency injection for testable Swift code — mock file system, network, and external APIs using focused protocols and Swift..."
  default_prompt: "Use the swift-protocol-di-testing skill to handle this task. Inspect relevant local files first, use mock or dry-run mode for external integrations, and report missing dependencies explicitly."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "exa"
      description: "Required only when running real exa MCP-backed workflows."
    - type: "env"
      value: "EXA_API_KEY"
      description: "Required only for real EXA_API_KEY integration tests; not used by mock smoke tests."
